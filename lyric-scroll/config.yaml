name: Lyric Scroll
version: "0.4.0"
slug: lyric_scroll
description: Display synchronized karaoke-style lyrics for currently playing music
url: https://github.com/loydmilligan/lyric-scroll
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:microphone-variant
panel_title: Lyrics
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Direct web UI access (optional, use ingress normally)
host_network: false
homeassistant_api: true
hassio_api: true
auth_api: true
options:
  media_players: []
  sync_offset_ms: 0
  display_mode: scroll
  theme: dark
  font_size: large
schema:
  media_players:
    - str?
  sync_offset_ms: int
  display_mode: list(scroll|page|focus)
  theme: list(dark|light|oled)
  font_size: list(small|medium|large|xlarge)
map:
  - data:rw
