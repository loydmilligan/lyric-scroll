<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Scroll</title>
    <link rel="stylesheet" href="css/main.css?v=0.3.1">
    <!-- Cast Sender SDK - must load before cast-sender.js -->
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</head>
<body>
    <div id="app">
        <!-- Album Art Container -->
        <div id="album-art-container" class="hidden">
            <img id="album-art" src="" alt="Album Art">
        </div>

        <!-- Track Info Overlay (MTV style) -->
        <div id="track-overlay" class="hidden">
            <div class="track-artist"></div>
            <div class="track-title"></div>
            <div class="track-album"></div>
        </div>

        <div id="lyrics-container">
            <div id="lyrics-content">
                <!-- Lyrics will be inserted here -->
            </div>
        </div>

        <div id="status-message">
            <span class="icon">♪</span>
            <span id="status-text">Waiting for music...</span>
            <!-- Audio Visualizer (shown when no lyrics) -->
            <div id="visualizer" class="hidden">
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
                <div class="viz-bar"></div>
            </div>
        </div>

        <div id="info-bar">
            <div id="track-info">
                <span id="track-title">-</span>
                <span id="track-artist">-</span>
            </div>
            <div id="info-bar-right">
                <span id="version">v0.5.2</span>
                <button id="cast-btn" class="cast-btn hidden" title="Cast to Chromecast">
                    <span class="cast-icon"></span>
                    <span class="cast-status">Cast</span>
                </button>
                <button id="settings-btn" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="hidden">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="settings-close" title="Close">✕</button>
            </div>

            <div class="settings-section">
                <h3>Sync</h3>
                <label>
                    Offset: <span id="offset-value">0ms</span>
                    <input type="range" id="offset-slider" min="-5000" max="5000" step="50" value="0">
                </label>
                <p class="settings-hint">Adjust if lyrics appear too early (negative) or too late (positive)</p>
            </div>

            <div class="settings-section">
                <h3>Theme</h3>
                <div class="theme-buttons">
                    <button class="theme-btn" data-theme="dark">Dark</button>
                    <button class="theme-btn" data-theme="light">Light</button>
                    <button class="theme-btn" data-theme="oled">OLED</button>
                </div>
            </div>

            <div class="settings-section">
                <h3>Album Art</h3>
                <label>
                    Position:
                    <select id="art-position">
                        <option value="left">Left Side</option>
                        <option value="right">Right Side</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </label>
                <label>
                    Size:
                    <select id="art-size">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                        <option value="xlarge">Extra Large</option>
                    </select>
                </label>
            </div>

            <div class="settings-section">
                <h3>Music Assistant</h3>
                <label class="setting-with-help">
                    <span class="setting-title">
                        Players to Track
                        <span class="help-icon" title="Select which Music Assistant players to monitor. Only selected players will appear in the mappings below and can be used for playlist queuing.">?</span>
                    </span>
                    <select id="ma-players" multiple size="5">
                        <option disabled>Loading players...</option>
                    </select>
                </label>
                <label class="setting-with-help">
                    <span class="setting-title">
                        Default Queue Target
                        <span class="help-icon" title="When queuing tracks via the API without specifying a player, this player will be used. Useful for AI/automation integrations.">?</span>
                    </span>
                    <select id="ma-default-player">
                        <option value="">None</option>
                    </select>
                </label>
                <div id="ma-display-mappings">
                    <h4 class="setting-title">
                        Player → Display Mapping
                        <span class="help-icon" title="Map each music player to a display where lyrics should be shown. When music plays on a player, lyrics will be cast to its mapped display.">?</span>
                    </h4>
                    <div id="ma-mapping-list">
                        <!-- Mappings will be populated dynamically with speaker → display icons -->
                    </div>
                </div>
                <div id="ma-autocast-settings">
                    <h4 class="setting-title">
                        Auto-Casting
                        <span class="help-icon" title="Automatically cast lyrics to displays when music plays. Requires a cast receiver URL.">?</span>
                    </h4>
                    <label class="setting-with-help">
                        <span class="setting-title">Enable Auto-casting</span>
                        <input type="checkbox" id="autocast-enabled">
                    </label>
                    <label class="setting-with-help">
                        <span class="setting-title">Cast URL</span>
                        <input type="text" id="autocast-url" placeholder="http://192.168.6.8:8099">
                    </label>
                    <label class="setting-row">
                        <span>Display IPs</span>
                        <input type="text" id="display-ips" placeholder='{"entity_id": "192.168.x.x"}'>
                    </label>
                    <p class="setting-help">JSON mapping display entity_id to IP address</p>
                </div>
            </div>

            <div class="settings-section">
                <h3>Chromecast</h3>
                <label class="setting-with-help">
                    <span class="setting-title">
                        Chromecast IP
                        <span class="help-icon" title="IP address of your Chromecast for automatic casting when music plays. Found in Google Home app under Device Settings.">?</span>
                    </span>
                    <input type="text" id="chromecast-ip" placeholder="e.g., 192.168.5.187">
                </label>
                <label class="setting-with-help">
                    <span class="setting-title">
                        Cast Application ID
                        <span class="help-icon" title="Get this from the Google Cast Developer Console ($5 one-time fee). Required for casting.">?</span>
                    </span>
                    <input type="text" id="cast-app-id" placeholder="e.g., 857B94F0">
                </label>
                <p class="settings-hint">
                    <a href="https://cast.google.com/publish" target="_blank">Register at Google Cast Console</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/cast-sender.js?v=0.5.0"></script>
    <script src="js/app.js?v=0.3.1"></script>
</body>
</html>
