<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Scroll</title>
    <link rel="stylesheet" href="css/main.css?v=0.2.1">
</head>
<body>
    <div id="app">
        <div id="lyrics-container">
            <div id="lyrics-content">
                <!-- Lyrics will be inserted here -->
            </div>
        </div>

        <div id="status-message">
            <span class="icon">♪</span>
            <span id="status-text">Waiting for music...</span>
        </div>

        <div id="info-bar">
            <div id="track-info">
                <span id="track-title">-</span>
                <span id="track-artist">-</span>
            </div>
            <div id="info-bar-right">
                <span id="version">v0.2.1</span>
                <button id="settings-btn" title="Settings">⚙️</button>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=0.2.1"></script>
</body>
</html>
