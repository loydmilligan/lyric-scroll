name: Lumberjacker
version: "0.6.0"
slug: lumberjacker
description: HA log watcher that triages and prioritizes log issues
url: https://github.com/loydmilligan/ha-addons
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8101
panel_icon: mdi:axe
panel_title: Lumberjacker
ports:
  8101/tcp: 8101
ports_description:
  8101/tcp: Direct web UI access
host_network: true
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
auth_api: true
options:
  check_interval: 60
  severity_threshold: "warning"
  ai_triage_enabled: false
  openrouter_api_key: ""
  openrouter_model: "anthropic/claude-3-haiku"
  triage_interval: 60
  mqtt_broker: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  check_interval: int
  severity_threshold: list(error|warning|info)?
  ai_triage_enabled: bool?
  openrouter_api_key: str?
  openrouter_model: str?
  triage_interval: int?
  mqtt_broker: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_password: password?
map:
  - config:ro
  - share:rw
