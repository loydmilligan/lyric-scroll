<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Control</title>
    <link rel="stylesheet" href="/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">🚀</span>
                <h1>Ground Control</h1>
                <span class="version-badge" id="version-badge">v0.1.4</span>
            </div>
            <div class="header-right">
                <div class="view-tabs">
                    <button class="tab active" data-view="kanban">Kanban</button>
                    <button class="tab" data-view="projects">Projects</button>
                    <button class="tab" data-view="history">History</button>
                </div>
                <button class="btn btn-primary" id="new-task-btn">+ New Task</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Kanban View -->
            <div id="kanban-view" class="view active">
                <div class="kanban-board">
                    <div class="bucket-column" data-bucket="brainstorm">
                        <div class="bucket-header brainstorm">
                            <span class="bucket-title">Brainstorm</span>
                            <span class="bucket-count">0</span>
                        </div>
                        <div class="bucket-tasks" data-bucket="brainstorm"></div>
                    </div>
                    <div class="bucket-column" data-bucket="planning">
                        <div class="bucket-header planning">
                            <span class="bucket-title">Planning</span>
                            <span class="bucket-count">0</span>
                        </div>
                        <div class="bucket-tasks" data-bucket="planning"></div>
                    </div>
                    <div class="bucket-column" data-bucket="investigation">
                        <div class="bucket-header investigation">
                            <span class="bucket-title">Investigation</span>
                            <span class="bucket-count">0</span>
                        </div>
                        <div class="bucket-tasks" data-bucket="investigation"></div>
                    </div>
                    <div class="bucket-column" data-bucket="cleanup">
                        <div class="bucket-header cleanup">
                            <span class="bucket-title">Cleanup</span>
                            <span class="bucket-count">0</span>
                        </div>
                        <div class="bucket-tasks" data-bucket="cleanup"></div>
                    </div>
                    <div class="bucket-column" data-bucket="work_queue">
                        <div class="bucket-header work_queue">
                            <span class="bucket-title">Work Queue</span>
                            <span class="bucket-count">0</span>
                        </div>
                        <div class="bucket-tasks" data-bucket="work_queue"></div>
                    </div>
                    <div class="bucket-column" data-bucket="active">
                        <div class="bucket-header active">
                            <span class="bucket-title">Active</span>
                            <span class="bucket-count">0</span>
                        </div>
                        <div class="bucket-tasks" data-bucket="active"></div>
                    </div>
                </div>
            </div>

            <!-- Projects View -->
            <div id="projects-view" class="view">
                <div class="projects-list" id="projects-list"></div>
            </div>

            <!-- History View -->
            <div id="history-view" class="view">
                <div class="history-filters">
                    <select id="history-project-filter">
                        <option value="">All Projects</option>
                    </select>
                </div>
                <div class="history-list" id="history-list"></div>
            </div>
        </main>

        <!-- Task Modal -->
        <div class="modal" id="task-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">New Task</h2>
                    <button class="modal-close" id="modal-close">&times;</button>
                </div>
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="form-group">
                        <label for="task-subject">Subject</label>
                        <input type="text" id="task-subject" required placeholder="What needs to be done?">
                    </div>
                    <div class="form-group">
                        <label for="task-description">Description</label>
                        <textarea id="task-description" rows="3" placeholder="Additional details..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-bucket">Bucket</label>
                            <select id="task-bucket">
                                <option value="brainstorm">Brainstorm</option>
                                <option value="planning">Planning</option>
                                <option value="investigation">Investigation</option>
                                <option value="cleanup">Cleanup</option>
                                <option value="work_queue">Work Queue</option>
                                <option value="active">Active</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="task-project">Project</label>
                            <select id="task-project">
                                <option value="">None</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="blocked-by-group" style="display: none;">
                        <label for="task-blocked-by">Blocked By</label>
                        <input type="text" id="task-blocked-by" placeholder="T-001, T-002">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
